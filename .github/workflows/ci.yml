name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJSON(vars.CI_RUNNER || '["self-hosted","linux","mercury-lite","xtrm-tools"]') }}

    strategy:
      matrix:
        node-version: [22.x]
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Node dependencies
      run: npm ci && cd cli && npm ci

    - name: Check package metadata
      run: npm run check:package

    - name: Build TypeScript
      run: cd cli && npm run build

    - name: Verify dist is up to date
      run: git diff --exit-code cli/dist/ || (echo "dist/ is out of sync — run 'cd cli && npm run build' and commit the result" && exit 1)

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest ruff

    - name: Run Linting
      run: |
        npx eslint . --ignore-pattern "**/node_modules/**" || echo "Eslint not configured yet"
        ruff check . || echo "Ruff not configured yet"

    - name: Check skills ownership drift
      run: npm run check:skills-ownership

    - name: Policy parity checks (Claude + Pi)
      run: |
        mkdir -p ~/.pi/agent/extensions
        cp -r packages/pi-extensions/extensions/* ~/.pi/agent/extensions/
        node scripts/compile-policies.mjs --check
        node scripts/compile-policies.mjs --check-pi

    - name: Verify specialists vendor freshness
      run: |
        npm run check:skills-ownership
        npm run check:registry-pack-parity
        npm run check:specialists-vendor
        git diff --exit-code -- .xtrm/skills/default .xtrm/specialists-source.json .xtrm/registry.json

    - name: Flat active skills layout guard
      run: npm run check:layout-guards

    - name: Run Tests
      run: |
        npm test --prefix cli
