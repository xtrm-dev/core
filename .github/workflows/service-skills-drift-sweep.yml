name: Service-Skills Drift Sweep

# Reusable workflow — call from a consumer repo with:
#   jobs:
#     drift:
#       uses: xtrm-dev/core/.github/workflows/service-skills-drift-sweep.yml@main
#       permissions:
#         contents: read
#         pull-requests: write
#
# Triggers on the CALLER side (typical: pull_request.closed + merged true).
# Default behavior remains detect-only; on drift, post a sticky comment on the merged PR with
# the summary and the reconcile instruction. Optional reconcile mode opens an auto-PR.

on:
  workflow_call:
    inputs:
      scripts-path:
        description: 'Path to drift_detector.py relative to repo root'
        type: string
        default: '.xtrm/skills/default/service-skills/scripts'
      python-version:
        type: string
        default: '3.11'
      comment-marker:
        description: 'Marker used to find/update an existing comment on the PR'
        type: string
        default: '<!-- service-skills-drift-sweep -->'
      reconcile-enabled:
        description: 'Run service-skills auto-reconcile and open a PR when drift exists'
        type: boolean
        default: false
      specialists-version:
        description: 'Exact @jaggerxtrm/specialists npm version used by the auto-reconcile job. Ignored when specialists-git-ref is set. Bump via PR — never use latest/main per Phase C pinning policy (xtrm-d8r36.2). 3.18.0 is the first registry release shipping service-skills-sync@1.6.0 (requires_worktree:false + script_template); earlier 3.17.x shipped v1.2.0 which is not CI-invocable.'
        type: string
        default: '3.18.0'
      specialists-git-ref:
        description: 'Optional escape hatch: pin to github:xtrm-dev/specialists#<sha-or-ref> instead of the npm registry. Originally added during xtrm-d8r36.7 while waiting for a registry release with service-skills-sync >=1.5; the 3.18.0 default makes this unnecessary for normal use, but the hook is retained for unblock-before-publish scenarios. Empty string disables.'
        type: string
        default: ''
      specialists-pack:
        description: 'Service-skills pack name passed to the specialist (script_template var $pack). Override only for non-default packs.'
        type: string
        default: 'default'
      bun-version:
        description: 'Bun runtime version. @jaggerxtrm/specialists ships as a #!/usr/bin/env bun bundle, so bun must be on PATH. Pin per Phase C policy.'
        type: string
        default: '1.3.12'
      beads-version:
        description: 'Exact @beads/bd npm version. service-skills-sync declares bd in capabilities.external_commands; specialist pre-run validation rejects without it on PATH.'
        type: string
        default: '1.0.5'
      pi-version:
        description: 'Exact @earendil-works/pi-coding-agent npm version. Provides the pi binary that sp script spawns for actual model calls. Requires node >= 22.19.'
        type: string
        default: '0.79.10'
      runs-on-reconcile:
        description: 'JSON string for runs-on of the auto-reconcile job. Defaults to ubuntu-latest for back-compat. Self-hosted callers pass e.g. ''["self-hosted","infra"]''.'
        type: string
        default: '"ubuntu-latest"'
      nano-gpt-model:
        description: 'nano-gpt model id (NANO_GPT_MODEL). Specialist consumes this under the hood. The :thinking variant has long quiet reasoning phases that exceed the specialist 120s no-activity stall_timeout on real-drift workloads (xtrm-efa2a) — default switched to the non-thinking model.'
        type: string
        default: 'moonshotai/kimi-k2.6'
      specialists-model:
        description: 'Provider-prefixed model id passed to sp script --model (specialist v1.6.0 has model:null and requires explicit override). Format: <provider>/<model-id>. Default avoids the :thinking variant to stay under the specialist 120s no-activity stall_timeout (xtrm-efa2a).'
        type: string
        default: 'nano-gpt/moonshotai/kimi-k2.6'
      specialists-stall-timeout-ms:
        description: 'Override for service-skills-sync.execution.stall_timeout_ms. Upstream specialist default of 120000 fires on real-drift workloads (xtrm-efa2a market-data run 28118772361 stalled at 120s even with the non-:thinking model). 600000 (10min) accommodates the multi-phase Serena+gitnexus tool-call architecture. Pre-step seeds this via sp edit --global; codex-side default bump tracked separately.'
        type: number
        default: 600000
      nano-gpt-api-url:
        description: 'nano-gpt chat-completions endpoint (NANO_GPT_API_URL). Override only to switch base path. Hostname locked to nano-gpt.com.'
        type: string
        default: 'https://nano-gpt.com/api/v1/chat/completions'
    secrets:
      nano-gpt-api-key:
        description: 'nano-gpt API key for service-skills auto-reconcile (used by service-skills-sync specialist)'
        required: false

concurrency:
  group: service-skills-drift-${{ github.ref }}
  cancel-in-progress: false

jobs:
  drift-sweep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      drift-count: ${{ steps.drift.outputs.drift_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Detect drift
        id: drift
        env:
          SCRIPTS_PATH: ${{ inputs.scripts-path }}
          COMMENT_MARKER: ${{ inputs.comment-marker }}
        run: |
          set -e
          if [ ! -f "$SCRIPTS_PATH/drift_detector.py" ]; then
            echo "::notice::no drift_detector at $SCRIPTS_PATH — skipping (repo not bootstrapped for service-skills)"
            echo "drift_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export PYTHONPATH="$PWD/$SCRIPTS_PATH:$PYTHONPATH"
          python3 - <<'PY' > /tmp/drift.json
          import json, sys
          try:
              from drift_detector import scan_drift
              d = scan_drift(use_gitnexus=False)
          except Exception as exc:
              print(f"drift_detector failed: {exc}", file=sys.stderr)
              d = []
          json.dump(d, sys.stdout)
          PY
          drift_count=$(python3 -c 'import json; print(len(json.load(open("/tmp/drift.json"))))')
          echo "drift_count=$drift_count" >> "$GITHUB_OUTPUT"
          if [ "$drift_count" = "0" ]; then
            echo "::notice::no service-skills drift detected"
            exit 0
          fi
          python3 - <<'PY' > /tmp/drift-summary.md
          import json, os
          d = json.load(open("/tmp/drift.json"))
          services = sorted({i["service_id"] for i in d})
          print(os.environ["COMMENT_MARKER"])
          print()
          print(f"## ⚠ Service-skills drift detected post-merge")
          print()
          print(f"**{len(d)} file(s) drifted** across {len(services)} service(s): `{', '.join(services)}`")
          print()
          print("**Action**: run `/updating-service-skills` (service-skills-sync specialist) to reconcile SKILL.md content and advance `last_sync_ref`.")
          print()
          print("<details><summary>Drifted files</summary>")
          print()
          for i in d[:40]:
              print(f"- `[{i['service_id']}]` `{i['file_path']}` (last sync: {i.get('last_sync', '?')})")
          if len(d) > 40:
              print(f"- … and {len(d) - 40} more")
          print()
          print("</details>")
          PY
          cat /tmp/drift-summary.md

      - name: Upload drift artifacts
        if: steps.drift.outputs.drift_count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: service-skills-drift
          path: |
            /tmp/drift.json
            /tmp/drift-summary.md
          if-no-files-found: error
          retention-days: 1

      - name: Find existing drift-sweep comment
        id: find_comment
        if: steps.drift.outputs.drift_count != '0' && github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: ${{ inputs.comment-marker }}

      - name: Comment on merged PR
        if: steps.drift.outputs.drift_count != '0' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: /tmp/drift-summary.md
          edit-mode: replace

      - name: Annotate workflow on drift (also for push events)
        if: steps.drift.outputs.drift_count != '0' && github.event_name != 'pull_request'
        run: |
          echo "::warning::service-skills drift detected (${{ steps.drift.outputs.drift_count }} file(s)) — caller event was '${{ github.event_name }}', no PR to comment on. See run summary."
          cat /tmp/drift-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate reconcile disabled
        if: steps.drift.outputs.drift_count != '0' && inputs['reconcile-enabled'] == false
        run: echo "::notice::service-skills auto-reconcile disabled; Phase A drift comment behavior preserved"

      - name: Annotate reconcile missing secret
        if: steps.drift.outputs.drift_count != '0' && inputs['reconcile-enabled']
        env:
          NANO_GPT_API_KEY: ${{ secrets['nano-gpt-api-key'] }}
        run: |
          if [ -z "$NANO_GPT_API_KEY" ]; then
            echo "::warning::service-skills auto-reconcile skipped because nano-gpt-api-key secret is absent; Phase A drift comment behavior preserved"
          fi

  auto-reconcile:
    needs: drift-sweep
    if: needs['drift-sweep'].outputs['drift-count'] != '0' && inputs['reconcile-enabled'] && !startsWith(github.event.pull_request.head.ref, 'xtrm-auto-reconcile/') && github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ${{ fromJSON(inputs['runs-on-reconcile']) }}
    # Phase C (xtrm-d8r36): reconcile path now runs the service-skills-sync specialist
    # via @jaggerxtrm/specialists npm package — same code that runs locally under
    # /updating-service-skills. SSOT lives in specialists. Phase B reconcile.py kept
    # as in-repo fallback only when sp install/run fails; scheduled for removal in C.6
    # after smoke (xtrm-d8r36.5) is green on at least one consumer repo.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # @earendil-works/pi-coding-agent (the pi binary sp spawns) requires
          # node >= 22.19. Bumped from 20 in xtrm-d8r36.5 smoke v9.
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs['bun-version'] }}

      - name: Download drift artifacts
        uses: actions/download-artifact@v8
        with:
          name: service-skills-drift
          path: /tmp/service-skills-drift

      - name: Install specialists (pinned, isolated)
        id: install_specialists
        env:
          SPECIALISTS_VERSION: ${{ inputs['specialists-version'] }}
          SPECIALISTS_GIT_REF: ${{ inputs['specialists-git-ref'] }}
          BEADS_VERSION: ${{ inputs['beads-version'] }}
          PI_VERSION: ${{ inputs['pi-version'] }}
        run: |
          set +e
          if [ -n "$SPECIALISTS_GIT_REF" ]; then
            target="github:xtrm-dev/specialists#${SPECIALISTS_GIT_REF}"
            echo "::notice::installing specialists from git ref: $target (specialists-version=$SPECIALISTS_VERSION ignored)"
          else
            target="@jaggerxtrm/specialists@${SPECIALISTS_VERSION}"
            echo "::notice::installing specialists from npm: $target"
          fi
          # Per-job tmpdir install — no global namespace, immune to persistent-runner
          # state leaks (xtrm-d8r36.5 smoke v3 hit ENOTDIR rename on a prior global
          # install of the same package). RUNNER_TEMP is wiped between jobs on ephemeral
          # runners and stable per-run on persistent ones.
          SP_INSTALL_DIR="${RUNNER_TEMP:-/tmp}/sp-install-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT:-0}"
          rm -rf "$SP_INSTALL_DIR"
          mkdir -p "$SP_INSTALL_DIR"
          (cd "$SP_INSTALL_DIR" && npm init -y >/dev/null 2>&1 && npm i --no-audit --no-fund "$target" "@beads/bd@$BEADS_VERSION" "@earendil-works/pi-coding-agent@$PI_VERSION") 2> /tmp/sp-install-stderr.log
          npm_status=$?
          if [ "$npm_status" -ne 0 ]; then
            echo "::warning::specialists install failed (exit $npm_status); falling back to Phase B reconcile.py"
            echo "::group::npm install stderr"
            tail -50 /tmp/sp-install-stderr.log 2>/dev/null || echo '(stderr missing)'
            echo "::endgroup::"
            echo 'installed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SP_BIN_DIR="$SP_INSTALL_DIR/node_modules/.bin"
          if [ ! -x "$SP_BIN_DIR/sp" ]; then
            echo "::warning::sp not found at $SP_BIN_DIR/sp after install; falling back to Phase B reconcile.py"
            ls -la "$SP_BIN_DIR" 2>&1 | head -20
            echo 'installed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Persist PATH addition for subsequent steps via $GITHUB_PATH.
          echo "$SP_BIN_DIR" >> "$GITHUB_PATH"
          installed_ver=$("$SP_BIN_DIR/sp" --version 2>/dev/null | head -1)
          echo "::notice::specialists installed at $SP_INSTALL_DIR: $installed_ver"
          echo "install_dir=$SP_INSTALL_DIR" >> "$GITHUB_OUTPUT"
          echo "sp_bin=$SP_BIN_DIR/sp" >> "$GITHUB_OUTPUT"
          echo 'installed=true' >> "$GITHUB_OUTPUT"

      - name: Configure pi nano-gpt provider
        if: steps.install_specialists.outputs.installed == 'true'
        env:
          NANO_GPT_API_KEY: ${{ secrets['nano-gpt-api-key'] }}
          NANO_GPT_API_URL: ${{ inputs['nano-gpt-api-url'] }}
          SPECIALISTS_MODEL: ${{ inputs['specialists-model'] }}
        run: |
          set +e
          if [ -z "$NANO_GPT_API_KEY" ]; then
            echo "::notice::no nano-gpt-api-key secret; skipping pi provider config (specialist path will fail with missing key, fallback will run)"
            exit 0
          fi
          mkdir -p "$HOME/.pi/agent"
          # Derive baseUrl from the nano-gpt-api-url input: strip the
          # /chat/completions tail to get the v1 root that pi uses.
          base_url="${NANO_GPT_API_URL%/chat/completions}"
          # Strip 'nano-gpt/' provider prefix if caller passed it; pi resolves
          # the bare model id within the provider's models[] list.
          model_id="${SPECIALISTS_MODEL#nano-gpt/}"
          export PI_PROVIDER_BASE="$base_url"
          export PI_PROVIDER_MODEL="$model_id"
          python3 - <<'PY'
          import json, os, pathlib
          home   = pathlib.Path(os.environ['HOME'])
          base   = os.environ['PI_PROVIDER_BASE']
          model  = os.environ['PI_PROVIDER_MODEL']
          key    = os.environ['NANO_GPT_API_KEY']
          model_entry = {
              'id': model,
              'name': model.split('/')[-1],
              'reasoning': model.endswith(':thinking'),
              'cost': {'input': 0, 'output': 0, 'cacheRead': 0, 'cacheWrite': 0},
              'contextWindow': 256000,
              'maxTokens': 65536,
          }
          provider_entry = {
              'baseUrl': base,
              'apiKey': key,
              'api': 'openai-completions',
              'authHeader': True,
              'models': [model_entry],
          }
          for fname in ('models.json', 'auth.json'):
              path = home / '.pi' / 'agent' / fname
              path.parent.mkdir(parents=True, exist_ok=True)
              try:
                  data = json.loads(path.read_text()) if path.exists() else {}
              except Exception:
                  data = {}
              data.setdefault('providers', {})['nano-gpt'] = provider_entry
              path.write_text(json.dumps(data, indent=2))
              path.chmod(0o600)
              print(f"wrote {path}")
          print(f"nano-gpt provider configured: baseUrl={base} model={model}")
          PY
          echo "::notice::pi nano-gpt provider configured (baseUrl=$base_url, model=$model_id)"
          # Surface config shape (no secrets) so the next failure mode is easy to RCA.
          python3 -c "import json; d=json.load(open('$HOME/.pi/agent/models.json')); p=d['providers']['nano-gpt']; print('config check — provider keys:', sorted(p.keys()), 'models count:', len(p.get('models',[])), 'first model id:', p['models'][0]['id'] if p.get('models') else None)"

      - name: Configure specialist model override (global user.json)
        if: steps.install_specialists.outputs.installed == 'true'
        env:
          SP_BIN: ${{ steps.install_specialists.outputs.sp_bin }}
          SPECIALISTS_MODEL: ${{ inputs['specialists-model'] }}
          SPECIALISTS_STALL_TIMEOUT_MS: ${{ inputs['specialists-stall-timeout-ms'] }}
        run: |
          set +e
          # service-skills-sync v1.6.0 sets execution.model:null; SpecialistLoader.get
          # throws SpecialistMissingModelError BEFORE --model from `sp script` is read
          # (xtrm-d8r36.5 smoke v5 RCA). Fix: seed the global user override layer.
          mkdir -p "$HOME/.config/specialists"
          # sp init --global seeds every shipped specialist with inherit defaults
          # (init.ts:906-944, idempotent). Required because sp edit --global --set
          # rejects names absent from the global file (edit.ts:739,755).
          "$SP_BIN" init --global > /tmp/sp-init-stdout.log 2> /tmp/sp-init-stderr.log
          init_status=$?
          if [ "$init_status" -ne 0 ]; then
            echo "::warning::sp init --global failed (exit $init_status); specialist path will fall back"
            echo "::group::sp init stderr"
            tail -30 /tmp/sp-init-stderr.log 2>/dev/null
            echo "::endgroup::"
            exit 0
          fi
          "$SP_BIN" edit --global --set "service-skills-sync.execution.model" "$SPECIALISTS_MODEL" 2> /tmp/sp-edit-stderr.log
          edit_status=$?
          if [ "$edit_status" -ne 0 ]; then
            echo "::warning::sp edit --global failed (exit $edit_status); specialist path will fall back"
            echo "::group::sp edit stderr"
            tail -30 /tmp/sp-edit-stderr.log 2>/dev/null
            echo "::endgroup::"
            exit 0
          fi
          echo "::notice::seeded global override: service-skills-sync.execution.model=$SPECIALISTS_MODEL"
          # xtrm-efa2a: upstream stall_timeout_ms=120000 fires on real-drift work even
          # without :thinking. Bump it in the global override layer; non-fatal if the
          # edit fails (we keep the model seed and let the run try).
          "$SP_BIN" edit --global --set "service-skills-sync.execution.stall_timeout_ms" "$SPECIALISTS_STALL_TIMEOUT_MS" 2> /tmp/sp-edit-stall-stderr.log
          stall_edit_status=$?
          if [ "$stall_edit_status" -ne 0 ]; then
            echo "::warning::sp edit --global --set stall_timeout_ms=$SPECIALISTS_STALL_TIMEOUT_MS failed (exit $stall_edit_status); specialist will use upstream default 120000ms"
            echo "::group::sp edit stall_timeout_ms stderr"
            tail -30 /tmp/sp-edit-stall-stderr.log 2>/dev/null
            echo "::endgroup::"
          else
            echo "::notice::seeded global override: service-skills-sync.execution.stall_timeout_ms=$SPECIALISTS_STALL_TIMEOUT_MS"
          fi
          "$SP_BIN" edit --global --get "service-skills-sync.execution.model" 2>&1 | head -3
          "$SP_BIN" edit --global --get "service-skills-sync.execution.stall_timeout_ms" 2>&1 | head -3

      - name: Reconcile drift (specialist path)
        id: reconcile
        if: steps.install_specialists.outputs.installed == 'true'
        env:
          NANO_GPT_API_KEY: ${{ secrets['nano-gpt-api-key'] }}
          NANO_GPT_MODEL: ${{ inputs['nano-gpt-model'] }}
          NANO_GPT_API_URL: ${{ inputs['nano-gpt-api-url'] }}
          CLAUDE_PROJECT_DIR: ${{ github.workspace }}
          SPECIALISTS_PACK: ${{ inputs['specialists-pack'] }}
          SPECIALISTS_MODEL: ${{ inputs['specialists-model'] }}
          # GITHUB_TOKEN is exposed to the specialist's bash tool so it can use
          # gh/git to commit & push directly (xtrm-vu2ro Path B prereq). When the
          # specialist's system_prompt gains a "create branch + open PR" phase
          # upstream, the env is already wired here — no further xtrm-tools edit
          # needed at that point.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          if [ -z "$NANO_GPT_API_KEY" ]; then
            echo "::warning::service-skills auto-reconcile skipped because nano-gpt-api-key secret is absent; Phase A drift comment behavior preserved"
            echo 'status=missing_secret' >> "$GITHUB_OUTPUT"
            echo 'path=specialist' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          sp script service-skills-sync \
            --template-field script_template \
            --vars "repo=$GITHUB_REPOSITORY" \
            --vars "pack=$SPECIALISTS_PACK" \
            --vars "cwd=$PWD" \
            --model "$SPECIALISTS_MODEL" \
            --json \
            --allow-write-capable \
            --allow-skills \
            --allow-local-scripts \
            > /tmp/reconcile-result.json 2> /tmp/reconcile-stderr.log
          sp_status=$?
          if [ "$sp_status" -ne 0 ]; then
            echo "::warning::sp script service-skills-sync exited $sp_status; trying Phase B fallback"
            echo "::group::sp stdout JSON"
            cat /tmp/reconcile-result.json || echo '(stdout JSON missing)'
            echo "::endgroup::"
            echo "::group::sp stderr"
            cat /tmp/reconcile-stderr.log || echo '(stderr missing)'
            echo "::endgroup::"
            echo 'status=failed' >> "$GITHUB_OUTPUT"
            echo 'path=specialist' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # sp script wraps the specialist's JSON output under .parsed_json:
          #   {success, output (raw str), parsed_json: {summary, services[], actions[]}, meta}
          # Read services/actions/summary from parsed_json with a top-level fallback so
          # legacy payloads still parse (xtrm-n02m4 RCA).
          #
          # xtrm-23qsu: kimi-k2.6 sometimes prefixes prose ("Now that I have...") before
          # the required JSON object after long tool-using sessions, so sp returns
          # success=false / error_type=invalid_json with no parsed_json. Tolerant
          # fallback: scan r.output for the largest balanced {...} that loads as a dict
          # AND has the expected service-skills-sync schema (summary/services/actions),
          # treat that as the payload, and mark tolerant_rescue=true so the wrapper
          # surfaces a notice + lets downstream gates pass.
          python3 - <<'PYOUT' >> "$GITHUB_OUTPUT"
          import json, sys
          def extract_largest_json_object(text):
              if not isinstance(text, str) or '{' not in text:
                  return None
              best, best_len = None, 0
              for start, ch in enumerate(text):
                  if ch != '{':
                      continue
                  depth = 0
                  for end in range(start, len(text)):
                      c = text[end]
                      if c == '{': depth += 1
                      elif c == '}':
                          depth -= 1
                          if depth == 0:
                              candidate = text[start:end+1]
                              if len(candidate) <= best_len:
                                  break
                              try:
                                  obj = json.loads(candidate)
                              except Exception:
                                  break
                              if isinstance(obj, dict) and any(k in obj for k in ('services','actions','summary')):
                                  best, best_len = obj, len(candidate)
                              break
              return best
          try:
              r = json.load(open('/tmp/reconcile-result.json'))
          except Exception:
              print('status=parse_error'); print('reconciled_count=0'); print('path=specialist'); print('tolerant_rescue=false'); sys.exit(0)
          rescue = False
          if isinstance(r.get('parsed_json'), dict):
              payload = r['parsed_json']
          else:
              recovered = extract_largest_json_object(r.get('output')) if r.get('error_type') == 'invalid_json' else None
              if isinstance(recovered, dict):
                  payload, rescue = recovered, True
              else:
                  payload = r
          actions = payload.get('actions') or []
          services = payload.get('services') or []
          # reconciled = count of services with edits applied OR explicit synced verdicts
          # (a 'synced (audited-and-unchanged)' verdict still bumps last_sync_ref in the
          # registry, so peter-evans has a real diff to PR even when no SKILL.md changed).
          reconciled = 0
          for s in services:
              if isinstance(s, dict):
                  if s.get('edits') or s.get('verdict','').startswith('synced'):
                      reconciled += 1
          # fallback: action items with type containing 'edit' or 'sync'
          if reconciled == 0:
              reconciled = sum(1 for a in actions if isinstance(a, dict) and any(k in str(a.get('type','')).lower() for k in ('edit','sync','reconcile')))
          summary = payload.get('summary') if isinstance(payload.get('summary'), dict) else {}
          status = 'success' if reconciled > 0 else (summary.get('status') or 'unknown')
          print(f'status={status}')
          print(f'reconciled_count={reconciled}')
          print('path=specialist')
          print(f'tolerant_rescue={"true" if rescue else "false"}')
          PYOUT
          if [ "$(grep -c '^tolerant_rescue=true' "$GITHUB_OUTPUT" 2>/dev/null || true)" -gt 0 ]; then
            echo "::notice::tolerant parser rescued JSON from model prose prefix (xtrm-23qsu) — proceeding with extracted payload"
          fi
          # Surface JSON to step summary for operator visibility
          {
            echo '### service-skills-sync result (specialist path)'
            echo ''
            echo '```json'
            python3 -m json.tool /tmp/reconcile-result.json 2>/dev/null || cat /tmp/reconcile-result.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Reconcile drift (Phase B fallback — reconcile.py)
        id: reconcile_fallback
        if: steps.install_specialists.outputs.installed != 'true' || steps.reconcile.outputs.status == 'failed' || steps.reconcile.outputs.status == 'parse_error'
        env:
          NANO_GPT_API_KEY: ${{ secrets['nano-gpt-api-key'] }}
          NANO_GPT_MODEL: ${{ inputs['nano-gpt-model'] }}
          NANO_GPT_API_URL: ${{ inputs['nano-gpt-api-url'] }}
        run: |
          set +e
          if [ -z "$NANO_GPT_API_KEY" ]; then
            echo "::warning::Phase B fallback also skipped: nano-gpt-api-key secret absent"
            echo 'status=missing_secret' >> "$GITHUB_OUTPUT"
            echo 'path=fallback' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::warning::Falling back to Phase B reconcile.py (specialist path unavailable). File follow-up bead in xtrm-dev/specialists if this recurs."
          python3 -m pip install --disable-pip-version-check --no-input httpx==0.28.1
          if [ $? -ne 0 ]; then
            echo 'status=failed' >> "$GITHUB_OUTPUT"
            echo 'path=fallback' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 .xtrm/skills/default/service-skills/scripts/reconcile.py --json > /tmp/reconcile-result.json 2> /tmp/reconcile-stderr.log
          if [ $? -ne 0 ]; then
            echo "::group::reconcile.py stdout JSON"
            cat /tmp/reconcile-result.json || echo '(missing)'
            echo "::endgroup::"
            echo "::group::reconcile.py stderr"
            cat /tmp/reconcile-stderr.log || echo '(missing)'
            echo "::endgroup::"
            echo 'status=failed' >> "$GITHUB_OUTPUT"
            echo 'path=fallback' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - <<'PYOUT' >> "$GITHUB_OUTPUT"
          import json
          result = json.load(open('/tmp/reconcile-result.json'))
          print(f"status={result.get('status', 'unknown')}")
          print(f"reconciled_count={result.get('reconciled_count', 0)}")
          print('path=fallback')
          PYOUT

      - name: Resolve effective reconcile outputs
        id: rx
        if: always()
        run: |
          # Specialist path wins when it produced a non-zero count; otherwise fallback.
          if [ "${{ steps.reconcile.outputs.path }}" = "specialist" ] && [ "${{ steps.reconcile.outputs.reconciled_count }}" != "0" ] && [ -n "${{ steps.reconcile.outputs.reconciled_count }}" ]; then
            echo "status=${{ steps.reconcile.outputs.status }}" >> "$GITHUB_OUTPUT"
            echo "reconciled_count=${{ steps.reconcile.outputs.reconciled_count }}" >> "$GITHUB_OUTPUT"
            echo "path=specialist" >> "$GITHUB_OUTPUT"
          else
            echo "status=${{ steps.reconcile_fallback.outputs.status }}" >> "$GITHUB_OUTPUT"
            echo "reconciled_count=${{ steps.reconcile_fallback.outputs.reconciled_count }}" >> "$GITHUB_OUTPUT"
            echo "path=${{ steps.reconcile_fallback.outputs.path || 'specialist' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Annotate reconcile path
        if: always()
        run: |
          echo "::notice::reconcile path used: ${{ steps.rx.outputs.path }} (status=${{ steps.rx.outputs.status }}, reconciled_count=${{ steps.rx.outputs.reconciled_count }})"

      - name: Detect uncommitted specialist edits (xtrm-vu2ro safety net)
        id: detect_edits
        if: always()
        run: |
          # xtrm-vu2ro: when the parser fails (xtrm-23qsu, or any future shape
          # drift) the specialist may still have applied real Serena edits to
          # the working tree before the wrapper rejected its JSON output. peter-
          # evans/create-pull-request is gated on parser-derived reconciled_count
          # today, so those edits would be lost on the ephemeral runner. Probe
          # git status here and let downstream gates fire on the disk truth.
          if git -C "$GITHUB_WORKSPACE" status --porcelain | grep -q . ; then
            echo 'has_edits=true' >> "$GITHUB_OUTPUT"
            count=$(git -C "$GITHUB_WORKSPACE" status --porcelain | wc -l | tr -d ' ')
            echo "::notice::specialist applied $count uncommitted file change(s); PR will open even if parser failed"
            git -C "$GITHUB_WORKSPACE" status --porcelain | head -30
          else
            echo 'has_edits=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Upload reconcile diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: service-skills-reconcile-result
          path: |
            /tmp/reconcile-result.json
            /tmp/reconcile-stderr.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Build auto-PR body
        if: |
          ((steps.rx.outputs.status == 'success' || steps.rx.outputs.status == 'partial') && steps.rx.outputs.reconciled_count != '0')
          || steps.detect_edits.outputs.has_edits == 'true'
        run: |
          # Three trigger cases for the auto-PR:
          #   (a) parser-clean specialist result (status=success/partial, count>0)
          #   (b) parser-clean fallback result   (same shape, path=fallback)
          #   (c) parser failed but specialist applied real edits on disk (xtrm-vu2ro)
          parser_ok='${{ (steps.rx.outputs.status == 'success' || steps.rx.outputs.status == 'partial') && steps.rx.outputs.reconciled_count != '0' }}'
          {
            if [ "$parser_ok" = "true" ]; then
              echo "## Auto-reconcile summary (path: ${{ steps.rx.outputs.path }})"
              echo
              echo '```json'
              python3 -m json.tool /tmp/reconcile-result.json 2>/dev/null || cat /tmp/reconcile-result.json
              echo '```'
            else
              echo "## Auto-reconcile (parser failed — recovered edits from disk; xtrm-vu2ro safety net)"
              echo
              echo "The wrapper could not parse the specialist's final output (\`status=${{ steps.rx.outputs.status }}\`, \`reconciled_count=${{ steps.rx.outputs.reconciled_count }}\`), but the specialist had already applied edits to the working tree before failing. Opening this PR so the work is reviewable instead of lost on the ephemeral runner."
              echo
              echo "See workflow run logs + the uploaded \`service-skills-reconcile-result\` artifact for the raw sp output."
              echo
              echo '<details><summary>Raw reconcile-result.json (first 2KB)</summary>'
              echo
              echo '```json'
              head -c 2048 /tmp/reconcile-result.json 2>/dev/null || echo '(missing)'
              echo
              echo '```'
              echo '</details>'
            fi
            echo
            echo '## Drift findings'
            echo
            cat /tmp/service-skills-drift/drift-summary.md
          } > /tmp/reconcile-pr-body.md

      - name: Open auto-reconcile PR
        if: |
          ((steps.rx.outputs.status == 'success' || steps.rx.outputs.status == 'partial') && steps.rx.outputs.reconciled_count != '0')
          || steps.detect_edits.outputs.has_edits == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v7 — pinned to SHA per ossf scorecard
        with:
          branch: xtrm-auto-reconcile/${{ github.sha }}
          commit-message: 'chore(service-skills): auto-reconcile drift [skip ci]'
          title: 'auto-reconcile: service-skills drift post-merge'
          body-path: /tmp/reconcile-pr-body.md
          labels: auto-reconcile, service-skills
          delete-branch: true
