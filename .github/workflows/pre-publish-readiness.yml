name: Pre-publish readiness

on:
  workflow_dispatch:
    inputs:
      specialists_ref:
        description: Specialists ref to inspect
        required: false
        default: master
        type: string

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Checkout specialists source
        uses: actions/checkout@v4
        with:
          repository: Jaggerxtrm/specialists
          ref: ${{ inputs.specialists_ref }}
          path: specialists-src

      - name: Record specialists source
        shell: bash
        run: |
          echo "specialists_ref=${{ inputs.specialists_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "specialists_sha=$(git -C specialists-src rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "SPECIALISTS_REPO_PATH=$GITHUB_WORKSPACE/specialists-src" >> "$GITHUB_ENV"

      - name: Check payload hygiene
        run: npm run check:payload-hygiene

      - name: Check asset contract
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const contractPath = './specialists-src/dist/asset-contract.json';
          const contract = JSON.parse(fs.readFileSync(contractPath, 'utf8'));
          const vendorRoot = process.env.SPECIALISTS_REPO_PATH;

          if (!vendorRoot) {
            throw new Error('SPECIALISTS_REPO_PATH missing');
          }

          if (!fs.existsSync(vendorRoot)) {
            throw new Error(`Vendor root missing: ${vendorRoot}`);
          }

          console.log(`asset contract: ${contractPath}`);
          console.log(`vendor root: ${vendorRoot}`);
          console.log(`contract keys: ${Object.keys(contract).join(', ')}`);
          NODE
        env:
          SPECIALISTS_REPO_PATH: ${{ github.workspace }}/specialists-src

      - name: Readiness checklist
        shell: bash
        run: |
          cat <<'TXT'
          Run fresh-machine smoke gate before tag:
          1. open .github/workflows/fresh-machine-smoke.yml
          2. dispatch fresh-machine smoke workflow with same release ref
          3. confirm payload hygiene + asset contract + smoke all pass
          TXT
