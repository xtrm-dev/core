name: Specialists asset validation

on:
  repository_dispatch:
    types:
      - specialists-asset-validation
  workflow_dispatch:
    inputs:
      specialists_sha:
        description: specialists commit SHA to validate
        required: true
        type: string
      expected_package_version:
        description: optional specialists package version
        required: false
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout xtrm-tools
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve specialists SHA
        id: specialists
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ github.event.client_payload.specialists_sha }}
          DISPATCH_TAG: ${{ github.event.client_payload.specialists_tag }}
          DISPATCH_PACKAGE_VERSION: ${{ github.event.client_payload.specialists_package_version }}
          INPUT_SHA: ${{ inputs.specialists_sha }}
          INPUT_PACKAGE_VERSION: ${{ inputs.expected_package_version }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            echo "sha=$DISPATCH_SHA" >> "$GITHUB_OUTPUT"
            echo "tag=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
            echo "package_version=$DISPATCH_PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
            echo "package_version=$INPUT_PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout specialists
        uses: actions/checkout@v7
        with:
          repository: Jaggerxtrm/specialists
          ref: ${{ steps.specialists.outputs.sha }}
          path: specialists-src
          token: ${{ github.token }}

      - name: Validate specialists asset contract
        run: node scripts/verify-asset-contract.mjs --contract specialists-src/dist/asset-contract.json --vendor-root .xtrm/skills/default

      - name: Summary
        if: always()
        env:
          RESOLVED_SHA: ${{ steps.specialists.outputs.sha }}
          RESOLVED_PACKAGE_VERSION: ${{ steps.specialists.outputs.package_version }}
          RESOLVED_TAG: ${{ steps.specialists.outputs.tag }}
        run: |
          echo "Specialists asset validation done"
          echo "sha: $RESOLVED_SHA"
          echo "package_version: $RESOLVED_PACKAGE_VERSION"
          echo "tag: $RESOLVED_TAG"
