name: Publish to npm

on:
  release:
    types: [published]

jobs:
  resolve_ref:
    runs-on: ubuntu-latest
    outputs:
      specialists_ref: ${{ steps.resolve.outputs.specialists_ref }}
    steps:
      - name: Checkout xtrm-tools
        uses: actions/checkout@v6

      - name: Resolve specialists ref from manifest
        id: resolve
        shell: bash
        run: |
          # Prefer the immutable resolved_sha (what we vendored against)
          # over the moving ref (e.g. 'master'). This guarantees the
          # specialists tarball used by fresh-machine-smoke matches the
          # mirror in .xtrm/skills/default by construction.
          sha="$(jq -r '.source.resolved_sha // empty' .xtrm/specialists-source.json)"
          ref="$(jq -r '.source.ref // empty' .xtrm/specialists-source.json)"
          resolved="${sha:-$ref}"
          if [ -z "$resolved" ]; then
            echo "::error::.xtrm/specialists-source.json missing both source.resolved_sha and source.ref" >&2
            exit 1
          fi
          echo "specialists_ref=$resolved" >> "$GITHUB_OUTPUT"
          echo "Resolved specialists ref: $resolved (sha=$sha ref=$ref)"

  fresh_machine_smoke:
    needs: resolve_ref
    uses: ./.github/workflows/fresh-machine-smoke.yml
    with:
      specialists_ref: ${{ needs.resolve_ref.outputs.specialists_ref }}

  publish:
    needs: [resolve_ref, fresh_machine_smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout specialists source
        uses: actions/checkout@v6
        with:
          repository: Jaggerxtrm/specialists
          ref: ${{ needs.resolve_ref.outputs.specialists_ref }}
          path: specialists-src

      - name: Record specialists source
        shell: bash
        env:
          SPECIALISTS_REF: ${{ needs.resolve_ref.outputs.specialists_ref }}
        run: |
          echo "specialists_ref=$SPECIALISTS_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "specialists_sha=$(git -C specialists-src rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "SPECIALISTS_REPO_PATH=$GITHUB_WORKSPACE/specialists-src" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check skills ownership
        run: npm run check:skills-ownership

      - name: Check specialists vendor
        env:
          SPECIALISTS_REPO_PATH: ${{ github.workspace }}/specialists-src
        run: npm run check:specialists-vendor

      - name: Check layout guards
        run: npm run check:layout-guards

      - name: Check payload hygiene
        run: npm run check:payload-hygiene

      - name: Registry ↔ npm pack parity
        run: npm run check:registry-pack-parity

      - name: Check asset contract
        run: node scripts/verify-asset-contract.mjs --contract ./specialists-src/dist/asset-contract.json --vendor-root .xtrm/skills/default

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SPECIALISTS_REPO_PATH: ${{ github.workspace }}/specialists-src
