name: Fresh-machine smoke

on:
  workflow_dispatch:
    inputs:
      specialists_ref:
        description: specialists ref to checkout and pack when tarball URL not provided
        required: false
        default: master
        type: string
      specialists_tarball_url:
        description: optional tarball URL or local path for specialists package
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      specialists_ref:
        required: false
        default: master
        type: string
      specialists_tarball_url:
        required: false
        default: ""
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout xtrm-tools
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Use Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Bun is required by @jaggerxtrm/specialists (sp binary uses
      # `#!/usr/bin/env bun`). Documented in specialists package.json
      # engines.bun >= 1.0.0.
      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Isolate npm cache
        shell: bash
        run: |
          set -euo pipefail
          npm config set cache "$(mktemp -d)" --global

      - name: Pack xtrm-tools
        shell: bash
        run: |
          set -euo pipefail
          npm pack --json > /tmp/xtrm-pack.json
          cp "$(node -e "const fs=require('fs'); const entries=JSON.parse(fs.readFileSync('/tmp/xtrm-pack.json','utf8')); console.log(entries[0].filename)")" /tmp/xtrm-tools.tgz

      - name: Checkout specialists source
        if: ${{ inputs.specialists_tarball_url == '' }}
        uses: actions/checkout@v4
        with:
          repository: Jaggerxtrm/specialists
          ref: ${{ inputs.specialists_ref }}
          path: specialists-src

      - name: Prepare specialists tarball
        shell: bash
        env:
          SPECIALISTS_TARBALL_URL: ${{ inputs.specialists_tarball_url }}
        run: |
          set -euo pipefail
          if [[ -n "$SPECIALISTS_TARBALL_URL" ]]; then
            if [[ "$SPECIALISTS_TARBALL_URL" =~ ^https?:// ]]; then
              curl -fsSL "$SPECIALISTS_TARBALL_URL" -o /tmp/specialists.tgz
            else
              cp "$SPECIALISTS_TARBALL_URL" /tmp/specialists.tgz
            fi
            exit 0
          fi

          pushd specialists-src >/dev/null
          npm pack --json > /tmp/specialists-pack.json
          filename="$(node -e "const fs=require('fs'); const entries=JSON.parse(fs.readFileSync('/tmp/specialists-pack.json','utf8')); console.log(entries[0].filename)")"
          cp "$filename" /tmp/specialists.tgz
          popd >/dev/null

      - name: Install tarballs globally
        shell: bash
        run: |
          set -euo pipefail
          npm install -g /tmp/xtrm-tools.tgz /tmp/specialists.tgz

      - name: Run smoke flow
        shell: bash
        # Capture exit codes per command. Release-contract invariants are
        # enforced in the next step; xt init / sp init may report partial
        # bootstrap failures due to upstream package quirks (e.g. @beads/bd
        # postinstall download) that are outside the release contract.
        run: |
          set -uo pipefail

          repo_dir="$(mktemp -d)"
          printf '%s' "$repo_dir" > /tmp/fresh-machine-repo-dir
          git init "$repo_dir"
          cd "$repo_dir"

          xt_init_status=0
          xt init -y >/tmp/xt-init.log 2>&1 || xt_init_status=$?
          xt doctor --cwd . --json >/tmp/xt-doctor-1.log 2>&1 || true
          xt update --apply --repo . >/tmp/xt-update.log 2>&1 || true
          xt doctor --cwd . --json >/tmp/xt-doctor-2.log 2>&1 || true

          sp_init_status=0
          sp init >/tmp/sp-init.log 2>&1 || sp_init_status=$?
          sp doctor >/tmp/sp-doctor.log 2>&1 || true
          sp list >/tmp/sp-list.log 2>&1 || true

          if [ "$xt_init_status" -ne 0 ]; then
            echo "::warning::xt init -y exit $xt_init_status (likely upstream package issue — release-contract assertions still run)"
          fi
          if [ "$sp_init_status" -ne 0 ]; then
            echo "::warning::sp init exit $sp_init_status (likely depends on a bootstrap phase that failed upstream)"
          fi

      - name: Validate release-contract assertions
        shell: bash
        # The release contract owns ONE thing: the vendored skills payload
        # in the xtrm-tools npm tarball gets correctly distributed into a
        # fresh project's .xtrm/skills/default/ on xt init.
        #
        # Explicitly OUT of scope here:
        #   - registry.json (Project Bootstrap phase, needs bd → @beads/bd)
        #   - sp list output (needs bd workspace, Pi extensions)
        # Those depend on third-party packages with their own postinstall
        # behaviour. Real fresh-user breakage there is tracked separately.
        run: |
          set -euo pipefail

          dump_logs() {
            echo "==== release-contract assertion failed; dumping captured logs ===="
            shopt -s nullglob
            for f in /tmp/xt-*.log /tmp/sp-*.log; do
              if [ -s "$f" ]; then
                echo "---- $f ----"
                cat "$f"
              fi
            done
            shopt -u nullglob
          }
          trap dump_logs ERR

          repo_dir="$(cat /tmp/fresh-machine-repo-dir)"
          cd "$repo_dir"

          # The 3 must-have specialists-owned skills land in the mirror.
          test -f .xtrm/skills/default/using-specialists-v3/SKILL.md
          test -f .xtrm/skills/default/update-specialists/SKILL.md
          test -f .xtrm/skills/default/using-specialists-auto/SKILL.md

          # No symlink leaks anywhere under the .xtrm tree.
          ! find .xtrm -type l | grep -q .

          # The "Source and destination must not be the same" regression
          # (the fresh-machine bug class this contract exists to catch).
          ! grep -R "Source and destination must not be the same" /tmp/xt-init.log /tmp/xt-doctor-1.log /tmp/xt-update.log /tmp/xt-doctor-2.log /tmp/sp-init.log /tmp/sp-doctor.log /tmp/sp-list.log

          echo "✅ release-contract assertions all passed"
