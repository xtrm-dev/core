name: Install order matrix

# Operator-triggered. Cannot run on push/PR because the four legs
# install third-party packages (@beads/bd, oh-pi, dolt, bv, …) whose
# bin layouts and post-install download steps vary by environment.
# That variance is outside the release-contract scope. checkDep in
# machine-bootstrap.ts already extends PATH with the well-known
# install dirs (xtrm-5k0o); see docs/release.md for what the matrix
# does and doesn't gate.

on:
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - leg: xt-only
          - leg: sp-only
          - leg: xt-then-sp
          - leg: sp-then-xt

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Bun is required by @jaggerxtrm/specialists (sp shebang).
      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Pack xtrm-tools
        run: |
          set -euo pipefail
          npm pack

      - name: Run install-order leg ${{ matrix.leg }}
        env:
          INSTALL_ORDER_LEG: ${{ matrix.leg }}
        run: |
          set -euo pipefail

          dump_logs() {
            echo "==== leg $INSTALL_ORDER_LEG failed; dumping captured logs ===="
            shopt -s nullglob
            for f in /tmp/xt-*.stdout /tmp/xt-*.stderr /tmp/sp-*.stdout /tmp/sp-*.stderr; do
              if [ -s "$f" ]; then
                echo "---- $f ----"
                cat "$f"
              fi
            done
            shopt -u nullglob
          }
          trap dump_logs ERR

          source scripts/__tests__/install-order-asserts.sh

          tarball="$(echo xtrm-tools-*.tgz)"
          repo_dir="$(mktemp -d)"
          npm install -g "./${tarball}"

          case "$INSTALL_ORDER_LEG" in
            xt-only)
              cd "$repo_dir"
              npm init -y >/dev/null
              git init -q
              git -c user.email=ci@example.com -c user.name=ci commit -q --allow-empty -m bootstrap
              xt init -y >/tmp/xt-init.stdout 2>/tmp/xt-init.stderr
              xt doctor --json >/tmp/xt-doctor.stdout 2>/tmp/xt-doctor.stderr
              assert_no_symlinks_under_repo "$repo_dir" "xt-only"
              ;;
            sp-only)
              cd "$repo_dir"
              npm init -y >/dev/null
              git init -q
              git -c user.email=ci@example.com -c user.name=ci commit -q --allow-empty -m bootstrap
              npm install -g @jaggerxtrm/specialists
              sp list >/tmp/sp-list.stdout 2>/tmp/sp-list.stderr
              if sp init >/tmp/sp-init.stdout 2>/tmp/sp-init.stderr; then
                echo "sp-only: sp init unexpectedly succeeded" >&2
                exit 1
              fi
              assert_stderr_contains /tmp/sp-init.stderr 'xt (install|init)' "sp-only"
              assert_no_symlinks_under_repo "$repo_dir" "sp-only"
              ;;
            xt-then-sp)
              cd "$repo_dir"
              npm init -y >/dev/null
              git init -q
              git -c user.email=ci@example.com -c user.name=ci commit -q --allow-empty -m bootstrap
              xt init -y >/tmp/xt-init.stdout 2>/tmp/xt-init.stderr
              npm install -g @jaggerxtrm/specialists
              sp init >/tmp/sp-init.stdout 2>/tmp/sp-init.stderr
              sp doctor >/tmp/sp-doctor.stdout 2>/tmp/sp-doctor.stderr
              assert_no_symlinks_under_repo "$repo_dir" "xt-then-sp"
              ;;
            sp-then-xt)
              cd "$repo_dir"
              npm init -y >/dev/null
              git init -q
              git -c user.email=ci@example.com -c user.name=ci commit -q --allow-empty -m bootstrap
              npm install -g @jaggerxtrm/specialists
              if sp init >/tmp/sp-first.stdout 2>/tmp/sp-first.stderr; then
                echo "sp-then-xt: sp init unexpectedly succeeded before xt install/init" >&2
                exit 1
              fi
              assert_stderr_contains /tmp/sp-first.stderr 'xt (install|init)' "sp-then-xt"
              xt init -y >/tmp/xt-init.stdout 2>/tmp/xt-init.stderr
              sp init >/tmp/sp-second.stdout 2>/tmp/sp-second.stderr
              sp doctor >/tmp/sp-doctor.stdout 2>/tmp/sp-doctor.stderr
              assert_no_symlinks_under_repo "$repo_dir" "sp-then-xt"
              ;;
            *)
              echo "unknown leg: $INSTALL_ORDER_LEG" >&2
              exit 1
              ;;
          esac
