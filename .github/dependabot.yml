# Dependabot security/version updates for xtrm-tools.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, javascript]
    groups:
      npm-root-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /cli
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, javascript, cli]
    groups:
      npm-cli-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: [dependencies, github-actions]
    groups:
      actions-all:
        patterns: ["*"]
